name: Build and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Enter the version (e.g., v1.0.0)"
        required: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: | 
          pip install -r requirements.txt
          pip install pillow

      - name: Clean old builds
        shell: bash
        run: |
          rm -rf build dist *.spec || true

      - name: Set variables (name + icon)
        shell: bash
        run: |
          echo "APP_NAME=Tap" >> $GITHUB_ENV

          if [[ "$RUNNER_OS" == "Windows" ]]; then
            echo "ICON=ui/icon.ico" >> $GITHUB_ENV
          elif [[ "$RUNNER_OS" == "macOS" ]]; then
            echo "ICON=ui/icon.icns" >> $GITHUB_ENV
          else
            echo "ICON=ui/icon.png" >> $GITHUB_ENV
          fi

      - name: Build executable (PyInstaller)
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            python -m PyInstaller --onefile main.py \
              --name $APP_NAME \
              --icon $ICON \
              --add-data "ui;ui"
          else
            python -m PyInstaller --onefile main.py \
              --name $APP_NAME \
              --icon $ICON \
              --add-data "ui:ui"
          fi

      - name: Prepare release folder
        shell: bash
        run: |
          ARCH="${{ runner.arch }}"
          OS="${{ matrix.os }}"

          mkdir -p release/${OS}-${ARCH}

          if [[ "$RUNNER_OS" == "Windows" ]]; then
            mv dist/Tap.exe release/${OS}-${ARCH}/Tap.exe
          elif [[ "$RUNNER_OS" == "Linux" ]]; then
            mv dist/Tap release/${OS}-${ARCH}/Tap
          elif [[ "$RUNNER_OS" == "macOS" ]]; then
            mv dist/Tap release/${OS}-${ARCH}/Tap
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Tap-${{ matrix.os }}-${{ runner.arch }}
          path: release/

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true

      - name: Show structure (debug)
        run: ls -R

      - name: Make binaries executable
        run: chmod +x release/** || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: Release ${{ github.event.inputs.version }}
          draft: false
          prerelease: false
          files: |
            release/**/*