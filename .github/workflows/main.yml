name: Build and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Enter the version (e.g., v1.0.0)"
        required: true

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Clean old builds
        shell: bash
        run: |
          rm -rf build dist *.spec || true

      - name: Build executable (with UI included)
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            python -m PyInstaller --onefile main.py --add-data "ui;ui"
          else
            python -m PyInstaller --onefile main.py --add-data "ui:ui"
          fi

      - name: Rename executable
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            mv dist/main.exe dist/app-windows.exe
          elif [[ "$RUNNER_OS" == "Linux" ]]; then
            mv dist/main dist/app-linux
          elif [[ "$RUNNER_OS" == "macOS" ]]; then
            mv dist/main dist/app-macos
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ matrix.os }}
          path: dist/*

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: List files (debug)
        run: ls -R

      - name: Make binaries executable
        run: chmod +x app-* || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: Release ${{ github.event.inputs.version }}
          draft: false
          prerelease: false
          files: |
            app-linux
            app-windows.exe
            app-macos