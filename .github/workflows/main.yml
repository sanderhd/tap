name: Build and Release
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Enter the version (e.g., v1.0.0)"
        required: true
permissions:
  contents: write
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pillow
      - name: Clean old builds
        shell: bash
        run: |
          rm -rf build dist *.spec || true
      - name: Set variables (name + icon)
        shell: bash
        run: |
          echo "APP_NAME=Tap" >> $GITHUB_ENV
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            echo "ICON=ui/icon.ico" >> $GITHUB_ENV
          elif [[ "$RUNNER_OS" == "macOS" ]]; then
            echo "ICON=ui/icon.icns" >> $GITHUB_ENV
          else
            echo "ICON=ui/icon.png" >> $GITHUB_ENV
          fi
      - name: Build executable (PyInstaller)
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            python -m PyInstaller --onefile main.py \
              --name $APP_NAME \
              --icon $ICON \
              --windowed \
              --add-data "ui;ui"
          else
            python -m PyInstaller --onefile main.py \
              --name $APP_NAME \
              --icon $ICON \
              --windowed \
              --add-data "ui:ui"
          fi

      - name: Build installer with Inno Setup (Windows only)
        if: runner.os == 'Windows'
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.2
        with:
          path: Tap.iss
          options: /O+

      - name: Prepare release folder (unique filenames per OS/arch)
        shell: bash
        env:
          VERSION: ${{ github.event.inputs.version }}
        run: |
          ARCH=$(echo "${{ runner.arch }}" | tr '[:upper:]' '[:lower:]')
          mkdir -p release
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            cp dist/Tap.exe "release/tap-windows-${ARCH}-${VERSION}.exe"
            cp installer_output/TapSetup.exe "release/tap-windows-${ARCH}-${VERSION}-setup.exe"
          elif [[ "$RUNNER_OS" == "Linux" ]]; then
            cp dist/Tap "release/tap-linux-${ARCH}-${VERSION}"
          elif [[ "$RUNNER_OS" == "macOS" ]]; then
            cp dist/Tap "release/tap-macos-${ARCH}-${VERSION}"
          fi
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Tap-${{ matrix.os }}-${{ runner.arch }}
          path: release/

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true
      - name: Show structure (debug)
        run: ls -R release
      - name: Make binaries executable
        run: chmod +x release/* || true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: Release ${{ github.event.inputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            release/*