<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tap - The Next Gen AutoClicker</title>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>Tap</h1>

            <label>Clicks per second</label>
            <input id="cps" type="number" value="10">

            <br><br>

            <label>
                <input type="radio" name="button" value="left" checked>
                Left
            </label>

            <label>
                <input type="radio" name="button" value="right">
                Right
            </label>

            <br><br>

            <button id="start">Start</button>
            <button id="stop">Stop</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
